openapi: 3.0.3
info:
  title: AI E-Commerce API
  version: 0.1.0
  description: API documentation for the mini electronics e-commerce backend.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Check whether the API server is alive.
      tags:
        - System
      responses:
        "200":
          description: API is running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: ai-e-commerce-api
  /ready:
    get:
      summary: Check whether the API is ready to serve traffic.
      tags:
        - System
      responses:
        "200":
          description: API can reach required dependencies.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  database:
                    type: string
                    example: connected
        "503":
          description: API cannot reach a required dependency.
  /api/v1/products:
    get:
      summary: List active products.
      tags:
        - Products
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Optional exact category filter.
          example: Accessories
        - in: query
          name: search
          schema:
            type: string
          description: Optional case-insensitive search across name, description, and brand.
          example: keyboard
      responses:
        "200":
          description: Product list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
        "500":
          description: Failed to list products.
  /api/v1/products/{id}:
    get:
      summary: Get one active product by ID.
      tags:
        - Products
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Product"
        "400":
          description: Invalid product ID.
        "404":
          description: Product not found.
        "500":
          description: Failed to get product.
  /api/v1/auth/register:
    post:
      summary: Register a customer account.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered and JWT returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "400":
          description: Invalid registration payload.
        "409":
          description: Email is already registered.
        "500":
          description: Failed to register user.
  /api/v1/auth/login:
    post:
      summary: Login with email and password.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful and JWT returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "400":
          description: Invalid login payload.
        "401":
          description: Invalid email or password.
        "500":
          description: Failed to login.
  /api/v1/me:
    get:
      summary: Get the authenticated user profile.
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current authenticated user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Missing, invalid, or expired token.
        "500":
          description: Failed to get current user.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: Backend Learner
        email:
          type: string
          format: email
          example: learner@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: password123
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: learner@example.com
        password:
          type: string
          format: password
          example: password123
    AuthEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Backend Learner
        email:
          type: string
          format: email
          example: learner@example.com
        role:
          type: string
          enum:
            - customer
            - admin
          example: customer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: KeyForge Mechanical Keyboard
        description:
          type: string
        brand:
          type: string
          example: KeyForge
        category:
          type: string
          example: Accessories
        price_cents:
          type: integer
          example: 12900
        stock_quantity:
          type: integer
          example: 40
        image_url:
          type: string
          example: https://images.unsplash.com/photo-1587829741301-dc798b83add3
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
